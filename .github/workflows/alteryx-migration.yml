name: Alteryx Migration

on:
  push:
    paths:
      - 'workflows/*.yxmd'

jobs:

  migrate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install Python Dependencies
        run: |
          pip install google-genai

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Check Databricks CLI
        run: |
          databricks version



      - name: Parse Workflow
        run: |
          python parser/parser.py workflows/Sample_Workflow1.yxmd

      - name: Generate DAB
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python generator.py

      - name: Debug Generated Files
        run: |
          echo "===== databricks.yml ====="
          cat generated/databricks.yml

          echo "===== jobs.yml ====="
          cat generated/resources/jobs.yml

          echo "===== workflow.py ====="
          head -50 generated/src/workflow.py
      
      - name: Show Generated Files
        run: |
          echo "===== databricks.yml ====="
          cat generated/databricks.yml

          echo "===== jobs.yml ====="
          cat generated/resources/jobs.yml

      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host=$DATABRICKS_HOST
          token=$DATABRICKS_TOKEN
          EOF
      - name: Debug Generated Files
        run: |
          echo "===== databricks.yml ====="
          cat generated/databricks.yml

          echo "===== jobs.yml ====="
          cat generated/resources/jobs.yml
      - name: Validate Bundle
        run: |
          cd generated
          databricks bundle validate

      - name: Deploy Bundle
        run: |
          cd generated
          databricks bundle deploy